name: Fuzz

on:
  pull_request:
    branches: ["master"]
    # Skip docs-only / asset-only PRs. Anything that can affect the
    # parse/CFG/SSA/taint pipeline or the fuzz harness itself triggers.
    paths:
      - "src/**"
      - "fuzz/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/fuzz.yml"
  schedule:
    # Weekly Sunday at 03:17 UTC. Long-form fuzz run: at 4 hours per
    # target, daily would burn ~56 GHA-hours/week for diminishing
    # returns once the corpus is warm. Weekly gives time for libFuzzer's
    # slow-growth phase to surface deeper crashes without being noisy.
    - cron: "17 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: fuzz-${{ matrix.target }}
    runs-on: ubuntu-latest
    # No explicit timeout-minutes: GHA's default 6h job timeout already
    # applies, and adding a tighter cap here would just be a second
    # point of failure that could kill libFuzzer mid-report after a
    # full fuzz budget had already been spent.
    strategy:
      fail-fast: false
      matrix:
        target: [scan_bytes, extract_summaries]
    steps:
      - uses: actions/checkout@v6

      # cargo-fuzz requires nightly: libFuzzer integration uses unstable
      # codegen flags (sanitizer / asan, link args).
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          cache: true
          cache-workspaces: |
            .
            fuzz

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      # build.rs short-circuits when this file exists, skipping the
      # frontend npm fallback. The fuzz harness never touches the
      # server/UI, so a placeholder is sufficient.
      - name: Stub frontend dist
        run: |
          mkdir -p src/server/assets/dist
          : > src/server/assets/dist/index.html

      # Persist generated corpus across runs so coverage compounds. The
      # SHA-keyed primary key makes each run save a fresh entry; the
      # restore-keys prefix falls back to whatever the most recent run
      # produced.
      - name: Restore fuzz corpus
        uses: actions/cache@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Choose fuzz duration
        id: budget
        # PR/push: 10 min per target. Other CI gates (rust-stable-test,
        # benchmark-gate) already wall-clock past 15 min, so this never
        # becomes the merge bottleneck and gives libFuzzer enough time
        # to hit warm-corpus paths instead of just the first second of
        # bytes-after-header.
        # Scheduled / manual: 5 hours per target. Public repo, GHA
        # minutes are free, and libFuzzer's deep-coverage growth phase
        # is what surfaces non-trivial crashes. 5h fits inside GHA's 6h
        # job ceiling with ~1h slack for setup, corpus cache restore,
        # libFuzzer post-run summary, and crash-artifact upload.
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "seconds=18000" >> "$GITHUB_OUTPUT"
          else
            echo "seconds=600" >> "$GITHUB_OUTPUT"
          fi

      # `--target` is set explicitly because taiki-e/install-action ships
      # cargo-fuzz as a musl-static binary, and cargo-fuzz's default target
      # is baked in at compile time (via the `current_platform` crate).
      # Without this override it would hand cargo `--target ...-musl`,
      # which is incompatible with `-Zsanitizer=address` (statically
      # linked libc), failing the build before fuzzing starts.
      - name: Run fuzz target
        run: cargo fuzz run --target x86_64-unknown-linux-gnu ${{ matrix.target }} -- -max_total_time=${{ steps.budget.outputs.seconds }}

      # libFuzzer drops repro inputs into fuzz/artifacts/<target>/ on
      # crash. Keep them around for triage; corpus already lives in the
      # cache.
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts-${{ matrix.target }}-${{ github.run_id }}
          path: fuzz/artifacts/${{ matrix.target }}/
          if-no-files-found: ignore
          retention-days: 14
