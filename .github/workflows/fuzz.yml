name: Fuzz

on:
  pull_request:
    branches: ["master"]
    # Skip docs-only / asset-only PRs. Anything that can affect the
    # parse/CFG/SSA/taint pipeline or the fuzz harness itself triggers.
    paths:
      - "src/**"
      - "fuzz/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/fuzz.yml"
  schedule:
    # Weekly Sunday at 03:17 UTC. Long-form fuzz run: at 4 hours per
    # target, daily would burn ~56 GHA-hours/week for diminishing
    # returns once the corpus is warm. Weekly gives time for libFuzzer's
    # slow-growth phase to surface deeper crashes without being noisy.
    - cron: "17 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: fuzz-${{ matrix.target }}
    runs-on: ubuntu-latest
    # No explicit timeout-minutes: GHA's default 6h job timeout already
    # applies, and adding a tighter cap here would just be a second
    # point of failure that could kill libFuzzer mid-report after a
    # full fuzz budget had already been spent.
    strategy:
      fail-fast: false
      matrix:
        target: [scan_bytes, extract_summaries, cross_file_taint]
    steps:
      - uses: actions/checkout@v6

      # cargo-fuzz requires nightly: libFuzzer integration uses unstable
      # codegen flags (sanitizer / asan, link args).
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          cache: true
          cache-workspaces: |
            .
            fuzz

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      # The lib's `serve` feature is on by default and `assets.rs`
      # `include_str!`s files from `src/server/assets/dist/`, which is
      # gitignored. Build the frontend for real instead of stubbing —
      # ~30s here is noise next to a 10m–5h fuzz budget, and it keeps
      # the fuzz environment honest about what the lib actually compiles
      # against.
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # Persist generated corpus across runs so coverage compounds. The
      # SHA-keyed primary key makes each run save a fresh entry; the
      # restore-keys prefix falls back to whatever the most recent run
      # produced.
      - name: Restore fuzz corpus
        uses: actions/cache@v5
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      # Layer real source files on top of whatever the cache restored.
      # The harness format is `<lang_idx_byte><source>`, so we prefix
      # each candidate file with its language index and drop it into
      # the corpus dir.
      #
      # Seed pool, all routed through the same `stage()` prefixing path:
      #   benches/fixtures/sample.<ext>      — single canonical sample
      #                                        per language (10 files,
      #                                        guaranteed to parse).
      #   tests/benchmark/corpus/**/*.<ext>  — 400 labeled vulnerability
      #                                        fixtures already in-tree.
      #                                        Drives diversity: distinct
      #                                        sink/source/sanitizer
      #                                        shapes per vuln class.
      #   fuzz/seed_corpus/<target>/*.<ext>  — target-specific
      #                                        hand-crafted seeds (e.g.
      #                                        cross_file_taint inputs
      #                                        that call the synthetic
      #                                        helpers — those names
      #                                        appear nowhere in
      #                                        benchmark corpus).
      #
      # Crucially, `fuzz/seed_corpus/` files are committed as **plain
      # source** without the prefix byte. The prefix is applied here at
      # stage time. Otherwise IDEs (RustRover, IntelliJ, etc.) silently
      # strip 0x00 / corrupt low control bytes on save and the seed
      # would feed libFuzzer the wrong language selector.
      #
      # Files are content-hashed into corpus entry names so reruns are
      # idempotent and adding new fixtures doesn't churn the cache.
      - name: Layer seed corpus
        run: |
          set -euo pipefail
          target=${{ matrix.target }}
          dest="fuzz/corpus/$target"
          mkdir -p "$dest"
          ext_to_idx() {
            case "$1" in
              rs)   echo 0 ;;
              js)   echo 1 ;;
              ts)   echo 2 ;;
              py)   echo 3 ;;
              go)   echo 4 ;;
              java) echo 5 ;;
              rb)   echo 6 ;;
              php)  echo 7 ;;
              c)    echo 8 ;;
              cpp)  echo 9 ;;
              *)    return 1 ;;
            esac
          }
          stage() {
            src="$1"
            ext="${src##*.}"
            idx=$(ext_to_idx "$ext") || return 0
            hash=$(sha256sum "$src" | cut -c1-16)
            out="$dest/seed-${ext}-${hash}"
            [ -e "$out" ] && return 0
            printf '%b' "$(printf '\\%03o' "$idx")" > "$out"
            cat "$src" >> "$out"
          }
          for f in benches/fixtures/sample.*; do
            [ -e "$f" ] && stage "$f"
          done
          while IFS= read -r f; do
            stage "$f"
          done < <(find tests/benchmark/corpus -type f \( \
                     -name '*.rs' -o -name '*.js' -o -name '*.ts' \
                  -o -name '*.py' -o -name '*.go' -o -name '*.java' \
                  -o -name '*.rb' -o -name '*.php' -o -name '*.c' \
                  -o -name '*.cpp' \))
          if [ -d "fuzz/seed_corpus/$target" ]; then
            while IFS= read -r f; do
              stage "$f"
            done < <(find "fuzz/seed_corpus/$target" -type f \( \
                       -name '*.rs' -o -name '*.js' -o -name '*.ts' \
                    -o -name '*.py' -o -name '*.go' -o -name '*.java' \
                    -o -name '*.rb' -o -name '*.php' -o -name '*.c' \
                    -o -name '*.cpp' \))
          fi
          echo "Corpus dir: $(ls "$dest" | wc -l) files"

      - name: Choose fuzz duration
        id: budget
        # PR/push: 10 min per target. Other CI gates (rust-stable-test,
        # benchmark-gate) already wall-clock past 15 min, so this never
        # becomes the merge bottleneck and gives libFuzzer enough time
        # to hit warm-corpus paths instead of just the first second of
        # bytes-after-header.
        # Scheduled / manual: 5 hours per target. Public repo, GHA
        # minutes are free, and libFuzzer's deep-coverage growth phase
        # is what surfaces non-trivial crashes. 5h fits inside GHA's 6h
        # job ceiling with ~1h slack for setup, corpus cache restore,
        # libFuzzer post-run summary, and crash-artifact upload.
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "seconds=18000" >> "$GITHUB_OUTPUT"
          else
            echo "seconds=600" >> "$GITHUB_OUTPUT"
          fi

      # `--target` is set explicitly because taiki-e/install-action ships
      # cargo-fuzz as a musl-static binary, and cargo-fuzz's default target
      # is baked in at compile time (via the `current_platform` crate).
      # Without this override it would hand cargo `--target ...-musl`,
      # which is incompatible with `-Zsanitizer=address` (statically
      # linked libc), failing the build before fuzzing starts.
      #
      # libFuzzer flags:
      #   -max_len=65536      Cap input size at 64KB. Real source files
      #                       sit well under this; uncapped inputs let
      #                       libFuzzer waste budget on million-byte
      #                       parse stress instead of structural mutation.
      #   -timeout=60         Flag any single iteration over 60s as a
      #                       hang. Tree-sitter / CFG / taint should
      #                       never need that long on 64KB; if they do,
      #                       it's an algorithmic-complexity bug worth
      #                       surfacing immediately rather than at the
      #                       1200s libFuzzer default.
      #   -dict=...           Token dictionary for cross-language
      #                       keywords + injection markers + the
      #                       synthetic helper names registered by
      #                       cross_file_taint, so mutations bias toward
      #                       structurally-meaningful tokens instead of
      #                       random byte salads.
      - name: Run fuzz target
        run: |
          cargo fuzz run --target x86_64-unknown-linux-gnu ${{ matrix.target }} -- \
            -max_total_time=${{ steps.budget.outputs.seconds }} \
            -max_len=65536 \
            -timeout=60 \
            -dict=fuzz/dict/all.dict

      # libFuzzer drops repro inputs into fuzz/artifacts/<target>/ on
      # crash. Keep them around for triage; corpus already lives in the
      # cache.
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts-${{ matrix.target }}-${{ github.run_id }}
          path: fuzz/artifacts/${{ matrix.target }}/
          if-no-files-found: ignore
          retention-days: 14
