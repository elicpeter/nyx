name: Unused dependencies

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "fuzz/Cargo.toml"
      - "frontend/package.json"
      - ".github/workflows/unused-deps.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  machete:
    name: cargo-machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Token-free, runs on stable (unlike cargo-udeps which needs
      # nightly and a full compile). Pure manifest scan — finishes in
      # seconds and is safe to gate PRs on.
      - uses: bnjbvr/cargo-machete@v0.7.0
