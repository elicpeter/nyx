name: Release build & publish

on:
  release:
    types: [created]

permissions:
  contents: write

env:
  BIN_NAME: nyx

jobs:
  frontend:
    # Build the Vite bundle once on Linux and share it with every matrix
    # build. `build.rs` skips its own npm fallback when
    # `src/server/assets/dist/index.html` already exists, so downloading
    # the artifact into that path before `cargo build` keeps Node off the
    # cross-compile and macOS/Windows runners.
    name: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: src/server/assets/dist/
          if-no-files-found: error
          retention-days: 1

  build:
    needs: frontend
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Download prebuilt frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: src/server/assets/dist/

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache: true

      - name: Install cross-compilation tools (ARM Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --bin ${{ env.BIN_NAME }} --target ${{ matrix.target }}

      # THIRDPARTY-LICENSES.html is committed at the repo root and kept in
      # sync with the dependency graph by the `third-party-licenses` CI
      # job. Release builds ship the committed copy directly — no
      # regeneration (and no per-runner cargo-about install) on the
      # release hot path.

      - name: Package (Linux & macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          BIN=${{ env.BIN_NAME }}
          TARGET=${{ matrix.target }}
          EXT=$([[ "$TARGET" == *windows* ]] && echo ".exe" || echo "")
          BIN_PATH=target/$TARGET/release/$BIN$EXT
          mkdir -p dist
          ARCHIVE=$BIN-$TARGET.zip
          zip -9 "dist/$ARCHIVE" "$BIN_PATH" THIRDPARTY-LICENSES.html LICENSE* COPYING*
          echo "ASSET=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Bin      = '${{ env.BIN_NAME }}'
          $Target   = '${{ matrix.target }}'
          $Ext      = '.exe'
          $BinPath  = "target/$Target/release/$Bin$Ext"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $Archive  = "$Bin-$Target.zip"

          # PowerShell’s native ZIP
          Compress-Archive `
              -Path $BinPath, 'THIRDPARTY-LICENSES.html', 'LICENSE*', 'COPYING*' `
              -DestinationPath "dist/$Archive" `
              -CompressionLevel Optimal

          Add-Content -Path $env:GITHUB_ENV -Value "ASSET=$Archive"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: dist/${{ env.ASSET }}
          if-no-files-found: error
          retention-days: 1

  reproducibility:
    # Informational supply-chain smoke test: build the release binary
    # twice with pinned SOURCE_DATE_EPOCH and path remapping, then diff
    # the SHA256 hashes. Scoped to x86_64-linux — the most tractable
    # target for byte-for-byte determinism.
    #
    # Non-gating: `continue-on-error: true` + not in `publish.needs`.
    # Stable Rust point releases can change codegen and snap a build
    # that was reproducible the day before; we don't want that to
    # block shipping. Failures show up as a yellow warning and get
    # investigated outside the release hot path.
    name: reproducibility-check
    needs: frontend
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Download prebuilt frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: src/server/assets/dist/

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-unknown-linux-gnu
          cache: true

      - name: Build twice and diff hashes
        shell: bash
        env:
          RUSTFLAGS: "--remap-path-prefix=${{ github.workspace }}=/build"
        run: |
          set -euo pipefail
          TARGET=x86_64-unknown-linux-gnu
          BIN=${{ env.BIN_NAME }}
          BIN_PATH="target/$TARGET/release/$BIN"

          SOURCE_DATE_EPOCH=$(git log -1 --format=%ct HEAD)
          export SOURCE_DATE_EPOCH
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH"

          cargo build --release --bin "$BIN" --target "$TARGET"
          HASH1=$(sha256sum "$BIN_PATH" | awk '{print $1}')
          echo "first build:  $HASH1"

          cargo clean --release --target "$TARGET"
          cargo build --release --bin "$BIN" --target "$TARGET"
          HASH2=$(sha256sum "$BIN_PATH" | awk '{print $1}')
          echo "second build: $HASH2"

          if [ "$HASH1" != "$HASH2" ]; then
            echo "::error::Reproducibility check failed: builds are not bit-identical"
            echo "  first:  $HASH1"
            echo "  second: $HASH2"
            exit 1
          fi
          echo "::notice::Reproducible build verified (sha256=$HASH1)"

  publish:
    # Collect all matrix build outputs, generate a single SHA256SUMS file,
    # then push everything to the GitHub release in one shot. Doing this
    # centrally (rather than per-matrix job) is the only way to produce a
    # checksum file that covers every published artifact.
    name: publish-release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      # Generate the SBOM from the source tree BEFORE downloading
      # artifacts. Syft scans `path: .` recursively; if release-artifacts/
      # exists at scan time, it would walk into the zipped binaries and
      # produce a polluted manifest.
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: nyx-${{ github.event.release.tag_name }}.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd release-artifacts
          ls -lh
          sha256sum *.zip > SHA256SUMS
          cat SHA256SUMS

      # Sigstore keyless signing — single source of artifact attestation.
      # Cert is OIDC-bound to this workflow run, recorded in Rekor, no
      # secrets at rest. Verifiers can check with:
      #   cosign verify-blob --certificate <file>.pem \
      #     --signature <file>.sig \
      #     --certificate-identity-regexp 'https://github.com/elicpeter/nyx/.*' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     <file>
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign keyless sign release artifacts
        shell: bash
        run: |
          set -euo pipefail
          SBOM="nyx-${{ github.event.release.tag_name }}.cdx.json"
          (
            cd release-artifacts
            for f in *.zip SHA256SUMS; do
              cosign sign-blob --yes \
                --output-signature "$f.sig" \
                --output-certificate "$f.pem" \
                "$f"
            done
          )
          cosign sign-blob --yes \
            --output-signature "$SBOM.sig" \
            --output-certificate "$SBOM.pem" \
            "$SBOM"

      # SLSA v1 build provenance: signed attestation that these exact
      # bytes were produced by this workflow run from this commit.
      # Attestations are stored in the GitHub attestations API and can
      # be verified with `gh attestation verify <file> --repo <repo>`.
      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            release-artifacts/*.zip
            release-artifacts/SHA256SUMS
            nyx-${{ github.event.release.tag_name }}.cdx.json

      - name: Upload to the release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-artifacts/*.zip
            release-artifacts/*.zip.sig
            release-artifacts/*.zip.pem
            release-artifacts/SHA256SUMS
            release-artifacts/SHA256SUMS.sig
            release-artifacts/SHA256SUMS.pem
            nyx-${{ github.event.release.tag_name }}.cdx.json
            nyx-${{ github.event.release.tag_name }}.cdx.json.sig
            nyx-${{ github.event.release.tag_name }}.cdx.json.pem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
